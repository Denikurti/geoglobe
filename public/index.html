<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoGlobe — North America</title>
  <link rel="stylesheet" href="styles.css?v=16" />
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.min.js"></script>
</head>
<body>
  <header id="topbar">
    <h1>🌎 GeoGlobe <span class="sub">North America v1 · AI: Groq cloud</span></h1>
    <button id="subscribeBtnTop" title="Get weekly briefing">📧 Weekly</button>
    <div id="modeTabs">
      <button class="mode-tab active" data-mode="states">🌍 States</button>
      <button class="mode-tab" data-mode="religion">✝ Religion & Ancient</button>
    </div>
    <div id="searchWrap">
      <input id="searchInput" type="text" placeholder="🔍 Search…" autocomplete="off" />
      <div id="searchResults" class="hidden"></div>
    </div>
    <button id="newsToggleBtn" title="Toggle news dots">📰 News</button>
    <div id="controls">
      <label class="ctl">Year: <span id="yearLabel">2025</span>
        <input type="range" id="timeline" min="1900" max="2025" value="2025" step="1" />
      </label>
      <label class="toggle"><input type="checkbox" id="tTheories" /> Theories</label>
      <label class="toggle"><input type="checkbox" id="tConnections" /> Connections Web</label>
      <label class="toggle"><input type="checkbox" id="tResources" /> Resources</label>
    </div>
  </header>

  <main id="layout">
    <!-- Agent sidebar -->
    <div id="agentBar">
      <div id="agentBarTitle">Lens</div>
    </div>
    <div id="agentDrawer" class="hidden">
      <div id="agentDrawerHeader">
        <span id="agentDrawerTitle"></span>
        <button id="agentDrawerClose">×</button>
      </div>
      <div id="agentDrawerBody"></div>
      <div id="agentDrawerDivider" title="Drag to resize"></div>
      <!-- Suggestions panel -->
      <div id="suggestSection" class="hidden">
        <div id="suggestSectionHeader">
          <span>💡 Suggestions</span>
          <button id="suggestSectionToggle">▼</button>
        </div>
        <div id="suggestSectionChips"></div>
      </div>
      <div id="agentChatSlot"></div>
      <div id="agentDrawerResizeHandle" title="Drag to resize width"></div>
    </div>

    <section id="mapPane">
      <svg id="map"></svg>
      <div id="legend"></div>
      <div id="timelineEventBar"></div>

      <!-- floating zoom control (Apple Maps style) -->
      <div id="mapZoomCtl">
        <button id="zoomInBtn" title="Zoom in">+</button>
        <button id="zoomOutBtn" title="Zoom out">−</button>
        <button id="zoomResetBtn" title="Reset view">⌖</button>
      </div>

      <!-- floating suggestions bubble -->
      <div id="quickAsk">
        <button id="quickAskBtn" title="Suggestions">✨</button>
        <div id="quickAskChips" class="hidden"></div>
      </div>
    </section>

    <!-- drag handle: resize map vs panel -->
    <div id="hDivider" title="Drag to resize"></div>

    <aside id="panel">
      <div id="mobilePanelHandle"><div id="mobilePanelPill"></div></div>
      <button id="mobilePanelClose">✕</button>
      <div id="panelEmpty" class="empty">Tap a country on the map to begin.</div>

      <div id="panelContent" class="hidden">
        <div id="panelTitleRow">
          <h2 id="countryName"></h2>
          <button id="shareBtn" title="Share this country">↑ Share</button>
          <button id="focusModeBtn" title="Focus mode">⛶ Focus</button>
        </div>
        <p id="countrySummary" class="summary"></p>

        <!-- stat cards -->
        <div id="statCards"></div>

        <div id="mindmapWrap">
          <div id="mindmap"></div>
          <div id="mindmapFullLabel" class="hidden"></div>
          <button id="mindmapExpandBtn" title="Expand mindmap">⤢ Expand</button>
        </div>

        <!-- drag handle: resize mindmap vs chat -->
        <div id="vDivider" title="Drag to resize"></div>

        <div id="chat">
          <div id="chatLogHeader">
            <span id="chatLogLabel">Output <span id="queueBadge"></span></span>
            <div id="chatHeaderBtns">
              <button type="button" id="mindmapTab" title="Show / hide mindmap">🧠 Mindmap</button>
              <button type="button" id="moveChatBtn" title="Move chat left/right">⇄ Left</button>
              <button type="button" id="clearChat" title="Clear chat">Clear</button>
              <button type="button" id="expandChatLog" title="Expand output">⤢ Expand</button>
            </div>
          </div>
          <div id="chatLog"></div>
          <form id="chatForm">
            <textarea id="chatInput" autocomplete="off" rows="1"
                      placeholder="Ask anything about this country…"></textarea>
            <button type="submit" title="Send">↑</button>
          </form>
        </div>
      </div>
    </aside>
  </main>

  <!-- suggestions popup (next to lens bar) -->
  <div id="suggestPopup" class="hidden">
    <div id="suggestPopupTitle">💡 Suggestions</div>
    <div id="suggestPopupChips"></div>
  </div>

  <!-- subscribe modal -->
  <div id="subscribeOverlay" class="hidden">
    <div id="subscribeModal">
      <button id="subscribeClose">×</button>
      <div class="sub-icon">🌍</div>
      <h2 class="sub-title">Weekly Geopolitical Briefing</h2>
      <p class="sub-desc">Every Monday — AI-powered intelligence on wars, alliances, and power shifts. Free.</p>
      <input id="subscribeEmail" type="email" placeholder="your@email.com" autocomplete="email" />
      <button id="subscribeSubmit">Get Weekly Briefing</button>
      <p id="subscribeMsg" class="hidden"></p>
    </div>
  </div>

  <!-- conflict drawer -->
  <div id="conflictDrawer" class="hidden">
    <div id="conflictDrawerHeader">
      <span id="conflictDrawerFlag" style="font-size:22px"></span>
      <div style="flex:1">
        <div id="conflictDrawerType" class="cd-intensity"></div>
      </div>
      <button id="conflictDrawerClose">×</button>
    </div>
    <div id="conflictDrawerBody"></div>
  </div>

  <!-- news hover tooltip -->
  <div id="newsTooltip" class="hidden"></div>

  <!-- news drawer (left side) -->
  <div id="newsDrawer" class="hidden">
    <div id="newsDrawerHeader">
      <span id="newsDrawerFlag"></span>
      <span id="newsDrawerTitle">Latest News</span>
      <button id="newsDrawerClose">×</button>
    </div>
    <div id="newsDrawerBody"></div>
    <div id="newsDrawerFooter">
      <button id="newsSummarizeBtn">🤖 AI Summarize</button>
    </div>
    <div id="newsDrawerResize" title="Drag to resize width"></div>
  </div>

  <!-- leaf-node detail popup -->
  <div id="popup" class="hidden">
    <button id="popupClose">×</button>
    <div id="popupBody"></div>
    <button id="popupAsk">Ask AI to explain more</button>
  </div>

  <script src="conflict_data.js"></script>
  <script src="agents_data.js"></script>
  <script src="ai.js"></script>
  <script src="mindmap.js"></script>
  <script src="map.js"></script>
  <script src="religion_data.js"></script>
  <script src="religion_panel.js"></script>
  <script src="app.js"></script>
</body>
</html>
